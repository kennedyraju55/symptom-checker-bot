  <circle cx="80" cy="90" r="28" fill="#e94560" opacity="0.18" />
  <text x="80" y="98" font-family="Segoe UI,Arial,sans-serif" font-size="28" fill="#e94560" text-anchor="middle" font-weight="bold" filter="url(#glow)">81</text>
  <text x="140" y="85" font-family="Segoe UI,Arial,sans-serif" font-size="36" fill="#ffffff" font-weight="bold">Symptom Checker Bot</text>
  <text x="140" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="16" fill="#8b949e">AI-Powered Symptom Analysis & Triage</text>
  <text x="140" y="155" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#6e7681">Powered by Local LLMs · Privacy-First · Open Source</text>
  <rect x="600" y="35" width="160" height="36" rx="18" fill="#e94560" opacity="0.15"/>
  <text x="680" y="58" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#e94560" text-anchor="middle" font-weight="600">🏥 Healthcare AI</text>
  <rect x="600" y="85" width="160" height="36" rx="18" fill="#e94560" opacity="0.10"/>
  <text x="680" y="108" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#e94560" text-anchor="middle" font-weight="600">🔒 100% Private</text>
  <rect x="600" y="135" width="160" height="36" rx="18" fill="#e94560" opacity="0.08"/>
  <text x="680" y="158" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#e94560" text-anchor="middle" font-weight="600">⚡ Local LLM</text>
