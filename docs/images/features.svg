  <text x="300" y="123" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">Automatic detection of 7 body regions:</text>
  <text x="300" y="140" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e"> head, chest, abdomen, limbs, general,</text>
  <text x="300" y="157" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e"> skin, mental</text>
  <rect x="285" y="185" width="235" height="10" rx="0" ry="5" fill="#e94560" opacity="0.15"/>
