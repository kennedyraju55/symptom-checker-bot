  <text x="78" y="252" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Medical History Tracking</text>
  <text x="45" y="278" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">Session-based history with timestamps,</text>
  <text x="45" y="295" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e"> urgency levels, and LLM responses</text>
  <text x="45" y="312" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e"></text>
  <rect x="30" y="340" width="235" height="10" rx="0" ry="5" fill="#e94560" opacity="0.15"/>
