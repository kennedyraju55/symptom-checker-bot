  <text x="333" y="252" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Interactive Chat</text>
  <text x="300" y="278" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">Multi-turn conversational interface fo</text>
  <text x="300" y="295" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">r detailed symptom exploration</text>
  <text x="300" y="312" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e"></text>
  <rect x="285" y="340" width="235" height="10" rx="0" ry="5" fill="#e94560" opacity="0.15"/>
