  <text x="555" y="123" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">Comprehensive symptom lists organized </text>
  <text x="555" y="140" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">by body system for quick reference</text>
  <text x="555" y="157" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e"></text>
  <rect x="540" y="185" width="235" height="10" rx="0" ry="5" fill="#e94560" opacity="0.15"/>
