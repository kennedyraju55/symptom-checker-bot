  <text x="588" y="252" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Rich Terminal UI</text>
  <text x="555" y="278" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">Beautiful formatted output with color-</text>
  <text x="555" y="295" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e">coded urgency panels</text>
  <text x="555" y="312" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e"></text>
  <rect x="540" y="340" width="235" height="10" rx="0" ry="5" fill="#e94560" opacity="0.15"/>
